<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css object Fit and position</title>
    <style>
        .container{
            height: 488px; 
            width:466px;
            border: 5px solid black;
            /* background-color: azure; */
            background-position: center center;
            background-clip: border-box;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmOSZJ0EqsceBFoYa-epQcseqUvtrgn2eLfQ&s");
            background-repeat: no-repeat;
        }

        img{
            height: 488px;
            width: 466px;
            /* object-fit: cover; */
            object-fit: contain;
            /* object-position: bottom right; */
            object-position: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmOSZJ0EqsceBFoYa-epQcseqUvtrgn2eLfQ&s" alt="">
    </div>
</body>
</html>
