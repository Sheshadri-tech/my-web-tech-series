<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css filters</title>

    <style>
            img{
                filter: blur(1px);
            }

            .img1{
                filter: brightness(px);

            }

            .img2{
                /* filter: contrast(100%); */
                filter: blur(10px) brightness(50%) contrast(200%);     
                }        
    </style>
</head>

<body>
    <div class="container">
        <img class="img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSG5gnreOGcQVUNtFuRqe4vjGaur25zYGh1pnoHv3-wXN_uJ3gqG-l-inU&s" alt="">
        <img class="img1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTDq2BnQGQOePvuJb_lQbY6K8qb5UbfJMW4Uw&s" alt="">
        <img class="img2" src="https://d2u0ktu8omkpf6.cloudfront.net/dfad71037b8f46a2afb01a61aaffe52dc670d6048129cba3.jpg" alt="">
    </div>
</body>

</html>
