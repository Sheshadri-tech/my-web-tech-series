<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 12px;
        }

        .box {
            box-sizing: border-box;
            border: 2px solid black;
            width: 80vw;
            /* height: 10vh; */
            margin: auto;
            background-color: aquamarine;
        }

        .container {
            box-sizing: border-box;
            border: 2px solid black;
            width: 80vw;
            /* height: 80vh; */
            margin: 22px auto;
            font-size: 18px;
            background-color: aquamarine;
        }

        .container p{
            font-size: 2em;
            width: 80px;
        }

        .mycont{
            border: 2px solid black;
            box-sizing: border-box;
            margin: 23px auto;
            color: blue;
            font-size: 23px;
            width: 100vmin;
            width: 80vw;
        }
    </style>
</head>

<body>
    <div class="box">
        this is the box </div>

    <div class="container">
        <p>

            Lorem ipsum dolor sit amet consectetur, adipisicing elit. Accusantium similique dignissimos ea illo eos qui
            et reiciendis sed itaque asperiores mollitia dolorum nemo, natus possimus excepturi dolores laborum corporis
            officiis.
        </p>
        lorem100
    </div>

    <div class="mycont">
        i am another container
    </div>
</body>

</html>
