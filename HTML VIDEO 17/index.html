<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTORSA</title>
    <style>
        /* element selectors
        /* div{
            background-color: red;
        } */
        /* class selectors */
        /* .red {
            background-color: red;
        }

        /* Id selectors */
        #green {
            background-color: green;
        }

        /* child selectors */
        div > p {
            color: blue;
            background-color: brown;
        }

        /* Desendent selectors */
        div p {
            color: blue;
            background-color:brown;
        }

        * {
            margin: 0;
            padding: 0;
        }

        /* universal selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* pseudo Selectors */
        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active{
            background-color: red;
        }

        a:hover{
            background-color: yellow;
        }
        p:first-child{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="one">
       <p>I am first</p>
       <p>I am second</p>
        </div>
    <div class="red">
        i am div
           <article>
            <p>I am a para inside div</p>
        </article>
    </div>
    <div id="green">
        i am another div
    </div>
    <a href="https:www.google.com">Go to Google</a>
    <a href="https:www.facebook2.com">Go to Facebook</a>
</body>
</html>
