<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
            width: 121px;
            height: 121px;
            background-color: red;
            border-radius: 100px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: animateX 3s linear infinite, animateY 1s cubic-bezier(0, 0, 0.61, 0.99) infinite alternate; 
        }

        .container {
            position: relative;
            background-color: rgb(60, 124, 166);
            width: 80vw;
            height: 80vh;
            border: 2px solid black;
        }

        @keyframes animateX{

            from
            {
                left: 0;
            }
            to
            {
                left: 100%;
            }
        }

         @keyframes animateY{

            from
            {
                bottom: 0;
            }
            to
            {
                bottom: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="box">

        </div>
<!-- 
         -->
    </div>
</body>
</html>
