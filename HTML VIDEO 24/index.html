<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px indianred
        }

        .text-element {
            text-shadow: 13px 4px 2px #1d1dbf;
            outline: 2px solid black;
            border: 2px solid indianred;
            border-radius: 55px;
            outline-offset: 2px;
        }
        }
    </style>
</head>

<body>
    <div class="box">I am a box</div>
    <p class="text-element"> Lorem ipsum dolor sit amet consectetur, adipisicing elit. Illum, dolor possimus! Delectus
        esse explicabo aut atque incidunt, quibusdam quisquam similique officiis adipisci, error consectetur recusandae
        harum tenetur. Corporis, aut adipisci?</p>
</body>

</html>
